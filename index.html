<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transformer Simulator — VecP Labs</title>
    <meta name="description" content="Interactive transformer architecture simulator. Build, visualize, and share custom model architectures at the primitive level." />
    <meta name="theme-color" content="#060a14" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #060a14; transition: background 0.2s; }
    </style>
    <script>
      // Prevent flash: apply saved theme to body immediately
      (function() {
        var t = localStorage.getItem('tsim-theme');
        if (t === 'light' || (!t && window.matchMedia('(prefers-color-scheme: light)').matches)) {
          document.body.style.background = '#f0f2f5';
          document.querySelector('meta[name="theme-color"]').content = '#f0f2f5';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
